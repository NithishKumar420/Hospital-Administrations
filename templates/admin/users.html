{% extends 'admin/adminpanel.html' %}

{% block content%}
<style>
    table {
            width: 80%;
            border-collapse: collapse;
            margin: 30px auto;
        }

th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

th {
            background-color: #1e1e2f;
            color: white;
        }

tr:nth-child(even) {
            background-color: #f2f2f2;
        }

tr:hover {
            background-color: #ddd;
}
</style>

    <table>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ staff.staff_id }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role }}</td>
            <td>
                <a href="{{ url_for('admin.edit_user', user_id=user.id) }}">Edit</a> |
                <a href="{{ url_for('admin.delete_user', user_id=user.id) }}" onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>


{% endblock %}
